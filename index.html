<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羲舟EGO - 数据治理平台</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<style>
/* ============ RESET & BASE ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #0a0e27; --bg-card: #111640; --bg-sidebar: #080b20; --bg-input: #0d1130;
  --bg-hover: #1a1f4a; --bg-modal: #111640; --accent: #00d4ff; --accent-glow: rgba(0,212,255,0.3);
  --text-primary: #e0e6ff; --text-secondary: #8892b0; --text-muted: #5a6380;
  --success: #00e676; --warning: #ffab40; --danger: #ff5252; --info: #448aff;
  --border: #1e2358; --border-glow: #00d4ff; --radius: 10px; --radius-sm: 6px;
  --transition: 0.25s ease;
  --sidebar-w: 240px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; display: flex;
  overflow-x: hidden; line-height: 1.5;
}
a { color: var(--accent); text-decoration: none; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ============ SIDEBAR ============ */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--bg-sidebar);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; padding: 20px 0;
}
.sidebar-logo {
  padding: 0 20px 24px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo .logo-icon {
  width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), #7c4dff);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff;
}
.sidebar-logo h2 { font-size: 18px; font-weight: 700; color: var(--text-primary); }
.sidebar-logo span { font-size: 11px; color: var(--text-secondary); }
.sidebar-nav { flex: 1; padding: 0 12px; display: flex; flex-direction: column; gap: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  border-radius: var(--radius); cursor: pointer; transition: var(--transition);
  color: var(--text-secondary); font-size: 14px; font-weight: 500; border: 1px solid transparent;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active {
  background: rgba(0,212,255,0.1); color: var(--accent);
  border-color: rgba(0,212,255,0.3); box-shadow: 0 0 12px rgba(0,212,255,0.1);
}
.nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
.sidebar-footer {
  padding: 16px 20px; border-top: 1px solid var(--border); margin-top: auto;
  font-size: 11px; color: var(--text-muted); text-align: center;
}

/* ============ MAIN CONTENT ============ */
.main { margin-left: var(--sidebar-w); flex: 1; padding: 24px 28px; min-height: 100vh; }
.page { display: none; }
.page.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.page-header h1 { font-size: 22px; font-weight: 700; }

/* ============ CARDS ============ */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; position: relative; overflow: hidden; transition: var(--transition);
}
.kpi-card:hover { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-2px); }
.kpi-card .kpi-icon {
  width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; margin-bottom: 12px;
}
.kpi-card .kpi-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-card .kpi-value { font-size: 28px; font-weight: 700; color: var(--text-primary); }
.kpi-card .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; margin-bottom: 20px;
}
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.card-header h3 { font-size: 16px; font-weight: 600; }

/* ============ CHART GRID ============ */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.chart-container { position: relative; height: 300px; }
.chart-container canvas { width: 100% !important; height: 100% !important; }

/* ============ TABLES ============ */
.table-wrap { overflow-x: auto; border-radius: var(--radius-sm); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  text-align: left; padding: 10px 12px; font-weight: 600; color: var(--text-secondary);
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 2px solid var(--border); white-space: nowrap;
}
td { padding: 10px 12px; border-bottom: 1px solid rgba(30,35,88,0.5); color: var(--text-primary); }
tr:hover td { background: rgba(0,212,255,0.03); }
.empty-cell { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }

/* ============ BUTTONS ============ */
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
  border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer;
  transition: var(--transition); border: 1px solid transparent; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
.btn-primary:hover { box-shadow: 0 0 16px var(--accent-glow); }
.btn-outline { background: transparent; border-color: var(--border); color: var(--text-secondary); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: rgba(255,82,82,0.15); color: var(--danger); border-color: rgba(255,82,82,0.3); }
.btn-danger:hover { background: rgba(255,82,82,0.25); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 4px; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ============ FORMS ============ */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; }
.form-control {
  width: 100%; padding: 9px 12px; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary); font-size: 13px;
  transition: var(--transition); outline: none;
}
.form-control:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
select.form-control { cursor: pointer; }
textarea.form-control { resize: vertical; min-height: 60px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ============ TABS ============ */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
.tab-btn {
  padding: 10px 20px; background: transparent; border: none; color: var(--text-secondary);
  font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent;
  transition: var(--transition); margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.sub-tab-content { display: none; }
.sub-tab-content.active { display: block; animation: fadeIn 0.25s ease; }

/* ============ MODALS ============ */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-modal); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 24px; max-width: 560px; width: 90%; max-height: 85vh; overflow-y: auto;
  box-shadow: 0 0 40px rgba(0,212,255,0.1); animation: fadeIn 0.2s ease;
}
.modal-lg { max-width: 700px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-header h3 { font-size: 18px; font-weight: 600; }
.modal-close {
  width: 32px; height: 32px; border-radius: 50%; background: transparent; border: 1px solid var(--border);
  color: var(--text-secondary); font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: var(--transition);
}
.modal-close:hover { border-color: var(--danger); color: var(--danger); }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

/* ============ TOAST ============ */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  animation: slideIn 0.3s ease; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  display: flex; align-items: center; gap: 8px;
}
.toast-success { background: rgba(0,230,118,0.15); border: 1px solid rgba(0,230,118,0.3); color: var(--success); }
.toast-error { background: rgba(255,82,82,0.15); border: 1px solid rgba(255,82,82,0.3); color: var(--danger); }
.toast-info { background: rgba(0,212,255,0.15); border: 1px solid rgba(0,212,255,0.3); color: var(--accent); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ============ STATUS BADGES ============ */
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
}
.badge-active { background: rgba(0,212,255,0.15); color: var(--accent); }
.badge-completed { background: rgba(0,230,118,0.15); color: var(--success); }
.badge-risk { background: rgba(255,82,82,0.15); color: var(--danger); }
.badge-pending { background: rgba(255,171,64,0.15); color: var(--warning); }
.badge-info { background: rgba(68,138,255,0.15); color: var(--info); }

/* ============ PRODUCTIVITY LAYOUT ============ */
.productivity-layout { display: grid; grid-template-columns: 340px 1fr; gap: 20px; }
.location-cards { display: flex; flex-direction: column; gap: 10px; }
.location-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 14px; cursor: pointer; transition: var(--transition);
}
.location-card:hover { border-color: var(--accent); }
.location-card.selected { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
.location-card .loc-header { display: flex; justify-content: space-between; align-items: center; }
.location-card .loc-code { font-size: 11px; color: var(--accent); font-weight: 600; }
.location-card .loc-name { font-size: 15px; font-weight: 600; margin: 4px 0; }
.location-card .loc-city { font-size: 12px; color: var(--text-secondary); }
.location-card .loc-actions { display: flex; gap: 4px; }

/* ============ ORDERS LAYOUT ============ */
.orders-layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
.order-filters { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px; }
.order-filters .form-group { margin-bottom: 0; }
.order-filters .form-control { width: 160px; }

/* ============ FINANCIAL INDICATORS ============ */
.indicator-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
.indicator-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 16px; text-align: center;
}
.indicator-card .ind-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; }
.indicator-card .ind-value { font-size: 24px; font-weight: 700; }
.indicator-card .ind-value.positive { color: var(--success); }
.indicator-card .ind-value.negative { color: var(--danger); }

/* ============ FINANCIAL SHEET TABLE ============ */
.sheet-section { margin-bottom: 16px; }
.sheet-section h4 { font-size: 14px; color: var(--accent); margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.sheet-total { font-weight: 700; border-top: 2px solid var(--accent); }

/* ============ FILTER ROW ============ */
.filter-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 16px; }
.filter-row .form-group { margin-bottom: 0; }

/* ============ DATE FILTER BAR ============ */
.date-filter-bar {
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 20px; margin-bottom: 20px;
}
.date-filter-bar .filter-label { font-size: 13px; color: var(--text-secondary); font-weight: 600; white-space: nowrap; }
.date-filter-bar .form-control { width: 150px; margin: 0; }
.date-filter-bar .filter-info {
  font-size: 12px; color: var(--accent); margin-left: auto; display: flex; align-items: center; gap: 4px;
}

/* ============ FORCE GRAPH ============ */
.force-graph-wrap {
  position: relative; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 24px;
}
.force-graph-wrap .fg-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
}
.force-graph-wrap .fg-legend {
  display: flex; gap: 16px; font-size: 11px; color: var(--text-secondary);
}
.force-graph-wrap .fg-legend span { display: flex; align-items: center; gap: 5px; }
.force-graph-wrap .fg-legend .dot {
  width: 10px; height: 10px; border-radius: 50%; display: inline-block;
}
#force-graph { width: 100%; height: 420px; cursor: grab; display: block; }
#force-graph:active { cursor: grabbing; }
.force-tooltip {
  position: absolute; pointer-events: none; background: rgba(10,14,39,0.95);
  border: 1px solid var(--accent); border-radius: 6px; padding: 10px 14px;
  font-size: 12px; color: var(--text-primary); box-shadow: 0 0 20px rgba(0,212,255,0.3);
  max-width: 260px; z-index: 10; display: none;
}

/* ============ EXPORT BUTTON ============ */
.export-btn {
  background: rgba(0,212,255,0.1); border: 1px solid var(--accent);
  color: var(--accent); display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px;
  font-weight: 500; cursor: pointer; transition: var(--transition);
}
.export-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 16px var(--accent-glow); }

/* Summary cards small */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.summary-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 14px; text-align: center;
}
.summary-card .s-label { font-size: 11px; color: var(--text-secondary); }
.summary-card .s-value { font-size: 22px; font-weight: 700; margin-top: 4px; }

@media (max-width: 1024px) {
  .chart-grid { grid-template-columns: 1fr; }
  .productivity-layout { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .sidebar { width: 60px; min-width: 60px; }
  .sidebar .nav-item span, .sidebar-logo div, .sidebar-footer { display: none; }
  .sidebar-logo { padding: 0 8px 16px; justify-content: center; }
  .sidebar-nav { padding: 0 4px; }
  .nav-item { justify-content: center; padding: 12px 8px; }
  .main { margin-left: 60px; padding: 16px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">E</div>
    <div><h2>羲舟EGO</h2><span>数据治理平台</span></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" data-page="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>总览仪表盘</span>
    </div>
    <div class="nav-item" data-page="productivity">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>数据产能</span>
    </div>
    <div class="nav-item" data-page="orders">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>商单追踪</span>
    </div>
    <div class="nav-item" data-page="financial">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>财务报表</span>
    </div>
  </nav>
  <div class="sidebar-footer">&copy; 2026 羲舟数据治理平台</div>
</aside>

<!-- MAIN CONTENT -->
<main class="main">

  <!-- ===== DASHBOARD PAGE ===== -->
  <div class="page active" id="page-dashboard">
    <div class="page-header">
      <h1>总览仪表盘</h1>
      <button class="export-btn" onclick="exportDashboardPDF()" title="导出仪表盘为PDF">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导出PDF
      </button>
    </div>
    <!-- Date Filter Bar -->
    <div class="date-filter-bar">
      <span class="filter-label">📅 查看日期范围：</span>
      <input type="date" class="form-control" id="dash-date-from" onchange="onDateFilterChange()">
      <span style="color:var(--text-muted);">至</span>
      <input type="date" class="form-control" id="dash-date-to" onchange="onDateFilterChange()">
      <button class="btn btn-outline btn-sm" onclick="resetDateFilter()">重置</button>
      <span class="filter-info" id="dash-filter-info"></span>
    </div>
    <div class="kpi-grid" id="dash-kpi-grid"></div>
    <!-- Force-directed Graph -->
    <div class="force-graph-wrap" id="force-graph-wrap">
      <div class="fg-header">
        <h3 style="font-size:16px;font-weight:600;">关系图谱</h3>
        <div class="fg-legend">
          <span><span class="dot" style="background:#00d4ff;"></span>甲方</span>
          <span><span class="dot" style="background:#ffab40;"></span>乙方</span>
          <span><span class="dot" style="background:#7c4dff;"></span>商单</span>
          <span><span class="dot" style="background:#00e676;"></span>采集地点</span>
        </div>
      </div>
      <svg id="force-graph"></svg>
      <div class="force-tooltip" id="force-tooltip"></div>
    </div>
    <div class="chart-grid">
      <div class="card"><div class="card-header"><h3>近7日产能趋势</h3></div><div class="chart-container"><canvas id="chart-trend"></canvas></div></div>
      <div class="card"><div class="card-header"><h3>商单状态分布</h3></div><div class="chart-container"><canvas id="chart-doughnut"></canvas></div></div>
    </div>
    <div class="card" id="dash-order-compare-card"><div class="card-header"><h3>商单对比</h3></div><div class="table-wrap"><table id="dash-order-compare-table"></table></div></div>
    <div class="card" id="dash-finance-card"><div class="card-header"><h3>财务概览</h3></div><div class="kpi-grid" id="dash-finance-grid"></div></div>
    <div class="card" id="dash-recent-card"><div class="card-header"><h3>最近产能记录</h3></div><div class="table-wrap"><table id="dash-recent-table"></table></div></div>
  </div>

  <!-- ===== PRODUCTIVITY PAGE ===== -->
  <div class="page" id="page-productivity">
    <div class="page-header"><h1>数据产能管理</h1><button class="btn btn-primary" onclick="openProductivityModal()">+ 新增产能记录</button></div>
    <div class="productivity-layout">
      <div class="card" style="padding:14px;">
        <div class="card-header"><h3>采集地点</h3><button class="btn btn-outline btn-xs" onclick="openLocationModal()">+ 新增</button></div>
        <div class="location-cards" id="location-cards"></div>
      </div>
      <div>
        <div class="card">
          <div class="card-header"><h3>产能记录</h3></div>

<!-- ============ SCRIPTS ============ -->
<script>
/* ================================================================= */
/*                     LOCALSTORAGE DATABASE                          */
/* ================================================================= */
const DB = (function() {
  var KEY = 'ego_db';
  var data = { nextId: 1, locations:[], productivity:[], partyA:[], partyB:[], partyAOrders:[], partyBOrders:[], financial:[] };

  function load() {
    var raw = localStorage.getItem(KEY);
    if (raw) { try { data = JSON.parse(raw); } catch(e) { data = { nextId: 1, locations:[], productivity:[], partyA:[], partyB:[], partyAOrders:[], partyBOrders:[], financial:[] }; } }
    if (!data.nextId) data.nextId = 1;
  }
  function save() { localStorage.setItem(KEY, JSON.stringify(data)); }

  // Generic CRUD factory
  function table(name) {
    return {
      all: function() { load(); return data[name] || []; },
      get: function(id) { load(); return (data[name]||[]).find(function(x) { return x.id === id; }); },
      create: function(obj) {
        load();
        obj.id = data.nextId++;
        obj.created_at = new Date().toISOString();
        if (!data[name]) data[name] = [];
        data[name].push(obj);
        save();
        return obj;
      },
      update: function(id, updates) {
        load();
        var arr = data[name] || [];
        var idx = -1;
        for (var i = 0; i < arr.length; i++) { if (arr[i].id === id) { idx = i; break; } }
        if (idx < 0) return null;
        for (var key in updates) {
          if (updates.hasOwnProperty(key)) { arr[idx][key] = updates[key]; }
        }
        save();
        return arr[idx];
      },
      delete: function(id) {
        load();
        data[name] = (data[name]||[]).filter(function(x) { return x.id !== id; });
        save();
      }
    };
  }

  return {
    locations: table('locations'),
    productivity: table('productivity'),
    partyA: table('partyA'),
    partyB: table('partyB'),
    partyAOrders: table('partyAOrders'),
    partyBOrders: table('partyBOrders'),
    financial: table('financial'),

    // Productivity summary
    prodSummary: function() {
      load();
      var items = data.productivity || [];
      var locs = data.locations || [];
      var map = {};
      for (var i = 0; i < items.length; i++) {
        var e = items[i];
        var l = null;
        for (var j = 0; j < locs.length; j++) { if (locs[j].id === e.location_id) { l = locs[j]; break; } }
        var n = l ? l.name : '未知';
        if (!map[n]) map[n] = 0;
        map[n] += (+e.hours || 0);
      }
      var total_hours = 0;
      for (var k = 0; k < items.length; k++) { total_hours += (+items[k].hours || 0); }
      var dateSet = {};
      for (var d = 0; d < items.length; d++) { dateSet[items[d].date] = true; }
      var per_location = [];
      var keys = Object.keys(map);
      for (var p = 0; p < keys.length; p++) { per_location.push({ location_name: keys[p], total_hours: map[keys[p]] }); }
      return {
        total_hours: total_hours,
        total_days: Object.keys(dateSet).length,
        total_tasks: items.length,
        per_location: per_location
      };
    },

    // Order summary
    orderSummary: function(prefix) {
      load();
      var items = data[prefix === 'party_a' ? 'partyAOrders' : 'partyBOrders'] || [];
      var total = items.length;
      var active = 0, completed = 0, total_amount = 0, done_amt = 0;
      for (var i = 0; i < items.length; i++) {
        var o = items[i];
        var p = +o.progress || 0;
        if (p > 0 && p < 100) active++;
        if (o.status === '已完成') { completed++; done_amt += (+o.contract_amount || 0); }
        total_amount += (+o.contract_amount || 0);
      }
      var pending = total_amount - done_amt;
      return {
        total: total, active: active, completed: completed,
        total_amount: total_amount,
        received: prefix === 'party_a' ? done_amt : 0,
        paid: prefix === 'party_b' ? done_amt : 0,
        pending: pending
      };
    },

    // Dashboard (supports optional date range filtering)
    dashboard: function(dateFrom, dateTo) {
      load();
      var allProd = data.productivity || [];
      // Filter productivity by date range
      var prod = allProd;
      if (dateFrom || dateTo) {
        prod = [];
        for (var i = 0; i < allProd.length; i++) {
          var d = allProd[i].date;
          if (!d) continue;
          if (dateFrom && d < dateFrom) continue;
          if (dateTo && d > dateTo) continue;
          prod.push(allProd[i]);
        }
      }
      var total_hours = 0;
      for (var i = 0; i < prod.length; i++) { total_hours += (+prod[i].hours || 0); }
      var dateSet = {};
      for (var j = 0; j < prod.length; j++) { dateSet[prod[j].date] = true; }
      var total_days = Object.keys(dateSet).length;
      var recent = [].concat(prod).sort(function(a, b) { return a.date > b.date ? -1 : 1; }).slice(-20);

      var aOrders = data.partyAOrders || [];
      var bOrders = data.partyBOrders || [];
      var active = 0, risk = 0;
      for (var k = 0; k < aOrders.length; k++) { var pa = +aOrders[k].progress || 0; if (pa > 0 && pa < 100) active++; if (aOrders[k].risks && aOrders[k].risks !== '正常' && aOrders[k].risks !== '低风险') risk++; }
      for (var l = 0; l < bOrders.length; l++) { var pb = +bOrders[l].progress || 0; if (pb > 0 && pb < 100) active++; if (bOrders[l].risks && bOrders[l].risks !== '正常' && bOrders[l].risks !== '低风险') risk++; }

      var fin = data.financial || [];
      function cat(t) {
        var sum = 0;
        for (var i = 0; i < fin.length; i++) {
          if (fin[i].entry_type === t || fin[i].category === t) { sum += (+fin[i].year_cumulative || 0); }
        }
        return sum;
      }
      function mcat(t) {
        var sum = 0;
        for (var i = 0; i < fin.length; i++) {
          if (fin[i].category === t || fin[i].entry_type === t) { sum += (+fin[i].month_amount || 0); }
        }
        return sum;
      }

      var party_a_revenue = 0;
      for (var m = 0; m < aOrders.length; m++) { party_a_revenue += (+aOrders[m].contract_amount || 0); }
      var party_b_cost = 0;
      for (var n = 0; n < bOrders.length; n++) { party_b_cost += (+bOrders[n].contract_amount || 0); }

      var fin_summary = {
        total_assets: cat('流动资产') + cat('非流动资产'),
        total_liabilities: cat('流动负债') + cat('非流动负债'),
        total_equity: cat('所有者权益'),
        monthly_revenue: mcat('收入') || mcat('数据服务收入'),
        monthly_profit: (mcat('收入') || mcat('数据服务收入')) - (mcat('成本') || mcat('营业成本'))
      };

      return {
        total_productivity_hours: total_hours,
        total_days: total_days,
        total_locations: (data.locations || []).length,
        total_party_a_orders: aOrders.length,
        total_party_b_orders: bOrders.length,
        party_a_revenue: party_a_revenue,
        party_b_cost: party_b_cost,
        active_orders: active,
        risk_orders: risk,
        recent_productivity: recent,
        financial_summary: fin_summary
      };
    },

    // Balance Sheet
    balanceSheet: function() {
      load();
      var fin = data.financial || [];
      function g(et) {
        var items = [];
        var total = 0;
        for (var i = 0; i < fin.length; i++) {
          if (fin[i].entry_type === et) {
            items.push({ name: fin[i].account_name, amount: fin[i].year_cumulative, account_name: fin[i].account_name, month_amount: fin[i].month_amount, year_cumulative: fin[i].year_cumulative });
            total += (+fin[i].year_cumulative || 0);
          }
        }
        return { items: items, total: total };
      }
      var ca = g('流动资产'), nca = g('非流动资产'), cl = g('流动负债'), ncl = g('非流动负债'), eq = g('所有者权益');
      return {
        current_assets: ca, non_current_assets: nca,
        total_assets: ca.total + nca.total,
        current_liabilities: cl, non_current_liabilities: ncl,
        total_liabilities: cl.total + ncl.total,
        equity_items: eq, total_equity: eq.total
      };
    },

    // Income Statement
    incomeStatement: function() {
      load();
      var fin = data.financial || [];
      var rev = [], cost = [], rt = 0, ct = 0;
      for (var i = 0; i < fin.length; i++) {
        var f = fin[i];
        if (f.entry_type === '收入') { rev.push({ name: f.account_name, amount: f.month_amount, account_name: f.account_name, month_amount: f.month_amount }); rt += (+f.month_amount || 0); }
        if (f.entry_type === '成本') { cost.push({ name: f.account_name, amount: f.month_amount, account_name: f.account_name, month_amount: f.month_amount }); ct += (+f.month_amount || 0); }
      }
      var profit = rt - ct;
      return {
        revenue_items: { items: rev, total: rt },
        cost_items: { items: cost, total: ct },
        operating_profit: profit, total_profit: profit, net_profit: profit
      };
    },

    // Cashflow
    cashflow: function() {
      load();
      var fin = data.financial || [];
      var cin = [], cout = [], it = 0, ot = 0;
      for (var i = 0; i < fin.length; i++) {
        var f = fin[i];
        if (f.entry_type === '收入') { cin.push({ name: f.account_name, amount: f.month_amount, account_name: f.account_name, month_amount: f.month_amount }); it += (+f.month_amount || 0); }
        if (f.entry_type === '成本') { cout.push({ name: f.account_name, amount: f.month_amount, account_name: f.account_name, month_amount: f.month_amount }); ot += (+f.month_amount || 0); }
      }
      return { cash_in: { items: cin, total: it }, cash_out: { items: cout, total: ot }, net_cashflow: it - ot };
    },

    // Financial Indicators
    indicators: function() {
      var bs = this.balanceSheet();
      var inc = this.incomeStatement();
      var ca = bs.current_assets.total, nca = bs.non_current_assets.total;

      var totalA = ca + nca, totalL = cl + ncl;
      function fv(v) { return v || null; }
      return {
        current_ratio: fv(cl ? +(ca / cl).toFixed(4) : null),
        quick_ratio: fv(cl ? +(ca / cl).toFixed(4) : null),
        debt_ratio: fv(totalA ? +(totalL / totalA).toFixed(4) : null),
        gross_margin: fv(rev ? +((rev - cost) / rev).toFixed(4) : null),
        net_margin: fv(rev ? +(profit / rev).toFixed(4) : null),
        roa: fv(totalA ? +(profit / totalA).toFixed(4) : null),
        roe: fv(eq ? +(profit / eq).toFixed(4) : null)

function filterByDate(items, dateField) {
  if (!dateFilterFrom && !dateFilterTo) return items;
  var result = [];
  for (var i = 0; i < items.length; i++) {
    var d = items[i][dateField];
    if (!d) continue;
    if (dateFilterFrom && d < dateFilterFrom) continue;
    if (dateFilterTo && d > dateFilterTo) continue;
    result.push(items[i]);
  }
  return result;
}

/* ================================================================= */
/*                    FORCE-DIRECTED GRAPH                             */
/* ================================================================= */
var forceGraphInitialized = false;

function renderForceGraph() {
  var partiesA = DB.partyA.all();
  var partiesB = DB.partyB.all();
  var aOrders = DB.partyAOrders.all();
  var bOrders = DB.partyBOrders.all();
  var locs = DB.locations.all();

  // Build nodes
  var nodes = [];
  // Party A nodes
  for (var i = 0; i < partiesA.length; i++) {
    nodes.push({ id: 'pa-' + partiesA[i].id, name: partiesA[i].name, type: 'party_a', icon: 'a' });
  }
  // Party B nodes
  for (var j = 0; j < partiesB.length; j++) {
    nodes.push({ id: 'pb-' + partiesB[j].id, name: partiesB[j].name, type: 'party_b', icon: 'b' });
  }
  // Location nodes
  for (var k = 0; k < locs.length; k++) {
    nodes.push({ id: 'loc-' + locs[k].id, name: locs[k].name, type: 'location', icon: 'l' });
  }
  // Order nodes
  for (var m = 0; m < aOrders.length; m++) {
    nodes.push({
      id: 'ord-a-' + aOrders[m].id,
      name: (aOrders[m].data_content || '商单').substring(0, 8),
      type: 'order_a', status: aOrders[m].status, amount: aOrders[m].contract_amount,
      partyId: 'pa-' + aOrders[m].party_a_id, icon: 'o'
    });
  }
  for (var n = 0; n < bOrders.length; n++) {
    nodes.push({
      id: 'ord-b-' + bOrders[n].id,
      name: (bOrders[n].data_content || '商单').substring(0, 8),
      type: 'order_b', status: bOrders[n].status, amount: bOrders[n].contract_amount,
      partyId: 'pb-' + bOrders[n].party_b_id, icon: 'o'
    });
  }

  // Build links
  var links = [];
  for (var p = 0; p < aOrders.length; p++) {
    links.push({ source: 'ord-a-' + aOrders[p].id, target: 'pa-' + aOrders[p].party_a_id, value: aOrders[p].contract_amount || 1 });
  }
  for (var q = 0; q < bOrders.length; q++) {
    links.push({ source: 'pb-' + bOrders[q].party_b_id, target: 'ord-b-' + bOrders[q].id, value: bOrders[q].contract_amount || 1 });
  }
  // Link locations to orders based on content match (loose)
  for (var r = 0; r < locs.length; r++) {
    for (var s = 0; s < aOrders.length; s++) {
      if (aOrders[s].data_content && locs[r].city && aOrders[s].data_content.indexOf(locs[r].city) >= 0) {
        links.push({ source: 'loc-' + locs[r].id, target: 'ord-a-' + aOrders[s].id, value: 0.5, dashed: true });
      }
    }
  }

  var svg = d3.select('#force-graph');
  svg.selectAll('*').remove();

  var container = document.getElementById('force-graph');
  if (!container) return; // safety check
  var width = container.parentElement.clientWidth || container.clientWidth || 800;
  var height = 420;
  // Force explicit size on SVG
  container.setAttribute('width', width);
  container.setAttribute('height', height);
  svg.attr('width', width).attr('height', height).attr('viewBox', '0 0 ' + width + ' ' + height);

  var colorMap = { party_a: '#00d4ff', party_b: '#ffab40', location: '#00e676', order_a: '#7c4dff', order_b: '#7c4dff' };
  var sizeMap = { party_a: 18, party_b: 18, location: 14, order_a: 10, order_b: 10 };

  var simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(function(d) { return d.id; }).distance(function(d) { return d.dashed ? 180 : 120; }))
    .force('charge', d3.forceManyBody().strength(-350))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(30));

  // Define arrow marker
  svg.append('defs').append('marker')
    .attr('id', 'arrowhead')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 22)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L8,0L0,4')
    .attr('fill', '#5a6380');

  // Draw links
  var link = svg.append('g').selectAll('line')
    .data(links).join('line')
    .attr('stroke', '#5a6380')
    .attr('stroke-width', function(d) { return Math.max(1, Math.log(d.value) / 8); })
    .attr('stroke-dasharray', function(d) { return d.dashed ? '6,4' : null; })
    .attr('marker-end', 'url(#arrowhead)')
    .attr('stroke-opacity', 0.5);

  // Draw nodes
  var node = svg.append('g').selectAll('g')
    .data(nodes).join('g')
    .attr('cursor', 'pointer')
    .call(d3.drag()
      .on('start', function(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', function(event, d) { d.fx = event.x; d.fy = event.y; })
      .on('end', function(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  node.append('circle')
    .attr('r', function(d) { return sizeMap[d.type] || 10; })
    .attr('fill', function(d) { return colorMap[d.type] || '#5a6380'; })
    .attr('stroke', function(d) { return d3.rgb(colorMap[d.type] || '#5a6380').brighter(0.5); })
    .attr('stroke-width', 2)
    .attr('stroke-opacity', 0.7);

  node.append('text')
    .text(function(d) { return d.name; })
    .attr('x', function(d) { return (sizeMap[d.type] || 10) + 6; })
    .attr('y', 4)
    .attr('fill', '#e0e6ff')
    .attr('font-size', '10px')
    .attr('font-family', '-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif');

  // Tooltip
  var tooltip = d3.select('#force-tooltip');
  node.on('mouseover', function(event, d) {
    var info = '<strong>' + d.name + '</strong><br/>';
    info += '类型: ' + ({party_a:'甲方',party_b:'乙方',location:'采集地点',order_a:'甲方商单',order_b:'乙方商单'})[d.type] + '<br/>';
    if (d.status) info += '状态: ' + d.status + '<br/>';
    if (d.amount) info += '金额: ¥' + Number(d.amount).toLocaleString('zh-CN',{minimumFractionDigits:2}) + '<br/>';
    tooltip.html(info).style('display', 'block').style('left', (event.offsetX + 15) + 'px').style('top', (event.offsetY - 10) + 'px');
  })
  .on('mousemove', function(event) {
    tooltip.style('left', (event.offsetX + 15) + 'px').style('top', (event.offsetY - 10) + 'px');
  })
  .on('mouseout', function() { tooltip.style('display', 'none'); });

  simulation.on('tick', function() {
    link
      .attr('x1', function(d) { return d.source.x; })
      .attr('y1', function(d) { return d.source.y; })
      .attr('x2', function(d) { return d.target.x; })
      .attr('y2', function(d) { return d.target.y; });
    node.attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; });
  });

  forceGraphInitialized = true;
}

function exportDashboardPDF() {
  toast('正在生成PDF，请稍候...', 'info');
  var dashboardEl = document.getElementById('page-dashboard');
  
  // Hide elements not suitable for PDF
  var sidebar = document.querySelector('.sidebar');
  var forceGraphWrap = document.getElementById('force-graph-wrap');
  var dateFilterBar = document.querySelector('.date-filter-bar');
  var exportBtn = document.querySelector('.export-btn');
  
  // Temporarily adjust layout
  var mainEl = document.querySelector('.main');
  var origMarginLeft = mainEl.style.marginLeft;
  var origWidth = dashboardEl.style.width;
  mainEl.style.marginLeft = '0';
  dashboardEl.style.width = '1100px';

  html2canvas(dashboardEl, {
    backgroundColor: '#0a0e27',
    scale: 2,
    useCORS: true,
    logging: false
  }).then(function(canvas) {
    // Restore layout
    mainEl.style.marginLeft = origMarginLeft;
    dashboardEl.style.width = origWidth;

    var imgData = canvas.toDataURL('image/png');
    var pdf = new jspdf.jsPDF('landscape', 'mm', 'a4');
    var pdfWidth = pdf.internal.pageSize.getWidth();
    var pdfHeight = (canvas.height * pdfWidth) / canvas.width;
    
    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
    
    // If content overflows one page, add more pages
    var totalPages = Math.ceil(pdfHeight / pdf.internal.pageSize.getHeight());
    for (var p = 1; p < totalPages; p++) {
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, -(p * pdf.internal.pageSize.getHeight()), pdfWidth, pdfHeight);
    }

    var dateStr = new Date().toISOString().slice(0, 10);
    pdf.save('Ego数据治理平台_仪表盘_' + dateStr + '.pdf');
    toast('PDF 导出成功！', 'success');
  }).catch(function(err) {
    mainEl.style.marginLeft = origMarginLeft;
    dashboardEl.style.width = origWidth;
    toast('PDF 导出失败: ' + err.message, 'error');
  });
}

function renderDashboardCharts(d) {

  var recent = d.recent_productivity || [];
  var dateMap = {};
  for (var i = 0; i < recent.length; i++) {
    var dt = recent[i].date;
    dateMap[dt] = (dateMap[dt] || 0) + (parseFloat(recent[i].hours) || 0);
  }
  var dates = Object.keys(dateMap).sort();
  var hours = dates.map(function(k) { return dateMap[k]; });

  var ctx1 = document.getElementById('chart-trend').getContext('2d');
  if (chartTrend) chartTrend.destroy();
  chartTrend = new Chart(ctx1, {
    type: 'line',
    data: {
      labels: dates,
      datasets: [{ label: '产出工时', data: hours, borderColor: '#00d4ff', backgroundColor: 'rgba(0,212,255,0.1)', fill: true, tension: 0.4, pointBackgroundColor: '#00d4ff', pointRadius: 4, pointHoverRadius: 6 }]
    },

      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#8892b0' } } },
      scales: {
        x: { ticks: { color: '#5a6380' }, grid: { color: 'rgba(30,35,88,0.5)' } },
        y: { ticks: { color: '#5a6380' }, grid: { color: 'rgba(30,35,88,0.5)' }, beginAtZero: true }
      }
    }
  });

  var aSum = DB.orderSummary('party_a');
  var bSum = DB.orderSummary('party_b');

  var totalCompleted = (aSum.completed || 0) + (bSum.completed || 0);
  var totalAll = (aSum.total || 0) + (bSum.total || 0);
  var other = Math.max(0, totalAll - totalActive - totalCompleted);

  var ctx2 = document.getElementById('chart-doughnut').getContext('2d');

  chartDoughnut = new Chart(ctx2, {
    type: 'doughnut',

      labels: ['进行中', '已完成', '其他'],

        borderColor: ['#00d4ff', '#00e676', '#ffab40'],
        borderWidth: 2, hoverBorderWidth: 3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#8892b0' } } }
    }

function loadProductivity() {
  var records = DB.productivity.all();
  // Apply date filters
  var dateFrom = document.getElementById('prod-date-from').value;
  var dateTo = document.getElementById('prod-date-to').value;
  if (dateFrom) {
    records = records.filter(function(r) { return r.date >= dateFrom; });
  }
  if (dateTo) {
    records = records.filter(function(r) { return r.date <= dateTo; });
  }
  // Apply location filter
  if (selectedLocationId) {
    records = records.filter(function(r) { return r.location_id === selectedLocationId; });
  }
  // Sort by date desc, then by id desc
  records.sort(function(a, b) { return a.date > b.date ? -1 : (a.date < b.date ? 1 : (b.id - a.id)); });
  currentProductivityRecords = records;
  renderProductivityTable(records);

  // Compute summary for filtered records
  var locs = DB.locations.all();
  var map = {};
  var totalHours = 0;
  var dateSet = {};
  for (var i = 0; i < records.length; i++) {
    var e = records[i];
    totalHours += (+e.hours || 0);
    if (e.date) dateSet[e.date] = true;
    var l = null;
    for (var j = 0; j < locs.length; j++) { if (locs[j].id === e.location_id) { l = locs[j]; break; } }
    var n = l ? l.name : '未知';
    if (!map[n]) map[n] = 0;
    map[n] += (+e.hours || 0);
  }
  var perLoc = [];
  var keys = Object.keys(map);
  for (var k = 0; k < keys.length; k++) { perLoc.push({ location_name: keys[k], total_hours: map[keys[k]] }); }
  var summary = { total_hours: totalHours, total_days: Object.keys(dateSet).length, total_tasks: records.length, per_location: perLoc };
  renderProductivitySummary(summary);
}

function renderProductivityTable(records) {
  var html = '<thead><tr><th>日期</th><th>任务名称</th><th>工时</th><th>地点</th><th>备注</th><th>操作</th></tr></thead><tbody>';
  if (!records || records.length === 0) {
    html += emptyRow(6);
  } else {
    var locs = DB.locations.all();
    for (var i = 0; i < records.length; i++) {
      var r = records[i];
      var locName = '-';
      var loc = null;
      for (var j = 0; j < locs.length; j++) { if (locs[j].id === r.location_id) { loc = locs[j]; break; } }
      if (loc) locName = loc.name;
      html += '<tr><td>' + fmtDate(r.date) + '</td><td>' + (r.task_name || '-') + '</td><td>' + (r.hours || 0) + '</td><td>' + locName + '</td><td>' + (r.remark || '-') + '</td><td><button class="btn btn-outline btn-xs" onclick="openProductivityModal(' + r.id + ')">编辑</button> <button class="btn btn-danger btn-xs" onclick="deleteProductivity(' + r.id + ')">删除</button></td></tr>';
    }
  }
  html += '</tbody>';
  document.getElementById('prod-records-table').innerHTML = html;
}

function renderProductivitySummary(summary) {
  var perLoc = summary.per_location || [];
  var html = '<thead><tr><th>采集地点</th><th>总工时(小时)</th></tr></thead><tbody>';
  if (perLoc.length === 0) {
    html += emptyRow(2);
  } else {
    for (var i = 0; i < perLoc.length; i++) {
      html += '<tr><td>' + (perLoc[i].location_name || '-') + '</td><td>' + (perLoc[i].total_hours || 0) + '</td></tr>';
    }
  }
  html += '<tr style="font-weight:700;border-top:2px solid var(--accent);"><td>合计</td><td>' + (summary.total_hours || 0) + '</td></tr>';
  html += '</tbody>';
  document.getElementById('prod-summary-table').innerHTML = html;
}

  if (!confirm('确定要删除该产能记录吗？')) return;

  if (type === 'party_a') loadOrdersA(); else loadOrdersB();
}

/* ================================================================= */
/*                          PARTNERS                                   */
/* ================================================================= */
function loadPartnersA() {
  allPartyA = DB.partyA.all();
  renderPartnerTable('partner-a-table', allPartyA, 'party_a');
}

function loadPartnersB() {
  allPartyB = DB.partyB.all();
  renderPartnerTable('partner-b-table', allPartyB, 'party_b');
}

function renderPartnerTable(tableId, partners, type) {
  var html = '<thead><tr><th>编码</th><th>简称</th><th>全称</th><th>' + (type === 'party_a' ? '行业' : '数据类型') + '</th><th>联系人</th><th>电话</th><th>邮箱</th><th>操作</th></tr></thead><tbody>';
  if (!partners || partners.length === 0) {
    html += emptyRow(8);
  } else {
    for (var i = 0; i < partners.length; i++) {
      var p = partners[i];
      var extra = type === 'party_a' ? (p.industry || '-') : (p.data_type || '-');
      html += '<tr><td>' + (p.code || '-') + '</td><td>' + (p.name || '-') + '</td><td>' + (p.full_name || '-') + '</td><td>' + extra + '</td><td>' + (p.contact || '-') + '</td><td>' + (p.phone || '-') + '</td><td>' + (p.email || '-') + '</td><td><button class="btn btn-outline btn-xs" onclick="editPartner(\'' + type + '\',' + p.id + ')">编辑</button> <button class="btn btn-danger btn-xs" onclick="deletePartner(\'' + type + '\',' + p.id + ')">删除</button></td></tr>';
    }
  }
  html += '</tbody>';
  document.getElementById(tableId).innerHTML = html;
}

function openPartnerModal(type, id) {
  document.getElementById('form-partner').reset();
  document.getElementById('partner-id').value = '';
  document.getElementById('partner-type').value = type;
  var extraLabel = document.getElementById('partner-extra-label');
  var extraField = document.getElementById('partner-extra-field');
  if (type === 'party_a') {
    extraLabel.textContent = '行业';
    extraField.placeholder = '行业';
  } else {
    extraLabel.textContent = '数据类型';
    extraField.placeholder = '数据类型';
  }
  if (id !== undefined && id !== null) {
    document.getElementById('modal-partner-title').textContent = '编辑合作方';
    var partner = (type === 'party_a' ? DB.partyA : DB.partyB).get(id);
    if (partner) {
      document.getElementById('partner-id').value = partner.id;
      document.getElementById('partner-code').value = partner.code || '';
      document.getElementById('partner-name').value = partner.name || '';
      document.getElementById('partner-full-name').value = partner.full_name || '';
      document.getElementById('partner-extra-field').value = type === 'party_a' ? (partner.industry || '') : (partner.data_type || '');
      document.getElementById('partner-contact').value = partner.contact || '';
      document.getElementById('partner-phone').value = partner.phone || '';
      document.getElementById('partner-email').value = partner.email || '';
      document.getElementById('partner-address').value = partner.address || '';
      document.getElementById('partner-remark').value = partner.remark || '';
    }
  } else {
    document.getElementById('modal-partner-title').textContent = '新增合作方';
  }
  openModal('modal-partner');
}

function editPartner(type, id) { openPartnerModal(type, id); }

function submitPartner(e) {
  e.preventDefault();
  var type = document.getElementById('partner-type').value;
  var data = {
    code: document.getElementById('partner-code').value,
    name: document.getElementById('partner-name').value,
    full_name: document.getElementById('partner-full-name').value,
    contact: document.getElementById('partner-contact').value,
    phone: document.getElementById('partner-phone').value,
    email: document.getElementById('partner-email').value,
    address: document.getElementById('partner-address').value,
    remark: document.getElementById('partner-remark').value
  };
  if (type === 'party_a') {
    data.industry = document.getElementById('partner-extra-field').value;
  } else {
    data.data_type = document.getElementById('partner-extra-field').value;
  }
  var id = document.getElementById('partner-id').value;
  if (id) {
    (type === 'party_a' ? DB.partyA : DB.partyB).update(parseInt(id), data);
    toast('合作方更新成功', 'success');
  } else {
    (type === 'party_a' ? DB.partyA : DB.partyB).create(data);
    toast('合作方创建成功', 'success');
  }
  closeModal('modal-partner');
  if (type === 'party_a') loadPartnersA(); else loadPartnersB();
}

function deletePartner(type, id) {
  if (!confirm('确定要删除该合作方吗？')) return;
  (type === 'party_a' ? DB.partyA : DB.partyB).delete(id);
  toast('合作方已删除', 'success');
  if (type === 'party_a') loadPartnersA(); else loadPartnersB();
}

var currentFinancialRecords = [];

function loadFinancialData() {
  currentFinancialRecords = DB.financial.all();
  renderFinancialTable(currentFinancialRecords);
}

function renderFinancialTable(records) {
  // Group by category
  var groups = {};
  for (var i = 0; i < records.length; i++) {
    var cat = records[i].category || '未分类';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(records[i]);
  }
  var html = '';
  var catNames = Object.keys(groups);
  for (var c = 0; c < catNames.length; c++) {
    var cat = catNames[c];
    var items = groups[cat];
    html += '<div class="sheet-section"><h4>' + cat + '</h4><table><thead><tr><th>科目名称</th><th>类型</th><th>本月金额</th><th>年度累计</th><th>操作</th></tr></thead><tbody>';
    for (var j = 0; j < items.length; j++) {
      var it = items[j];
      html += '<tr><td>' + (it.account_name || '-') + '</td><td>' + (it.entry_type || '-') + '</td><td>' + fmtMoney(it.month_amount) + '</td><td>' + fmtMoney(it.year_cumulative) + '</td><td><button class="btn btn-outline btn-xs" onclick="editFinancial(' + it.id + ')">编辑</button> <button class="btn btn-danger btn-xs" onclick="deleteFinancial(' + it.id + ')">删除</button></td></tr>';
    }
    html += '</tbody></table></div>';
  }
  if (catNames.length === 0) {
    html = '<div class="empty-cell" style="padding:40px;">暂无数据</div>';
  }
  document.getElementById('fin-table').innerHTML = html;
}

function openFinancialModal(id) {
  document.getElementById('form-financial').reset();
  document.getElementById('fin-id').value = '';
  if (id !== undefined && id !== null) {
    document.getElementById('modal-financial-title').textContent = '编辑财务记录';
    var rec = DB.financial.get(id);
    if (rec) {
      document.getElementById('fin-id').value = rec.id;
      document.getElementById('fin-category').value = rec.category || '';
      document.getElementById('fin-entry-type').value = rec.entry_type || '成本';
      document.getElementById('fin-account-name').value = rec.account_name || '';
      document.getElementById('fin-month-amount').value = rec.month_amount != null ? rec.month_amount : '';
      document.getElementById('fin-year-cumulative').value = rec.year_cumulative != null ? rec.year_cumulative : '';
    }
  } else {
    document.getElementById('modal-financial-title').textContent = '新增财务记录';
  }
  openModal('modal-financial');
}

function editFinancial(id) { openFinancialModal(id); }

function submitFinancial(e) {
  e.preventDefault();
  var data = {
    category: document.getElementById('fin-category').value,
    entry_type: document.getElementById('fin-entry-type').value,
    account_name: document.getElementById('fin-account-name').value,
    month_amount: parseFloat(document.getElementById('fin-month-amount').value) || 0,
    year_cumulative: parseFloat(document.getElementById('fin-year-cumulative').value) || 0
  };
  var id = document.getElementById('fin-id').value;
  if (id) {
    DB.financial.update(parseInt(id), data);
    toast('财务记录更新成功', 'success');
  } else {
    DB.financial.create(data);
    toast('财务记录创建成功', 'success');
  }
  closeModal('modal-financial');
  loadFinancialData();
}

function deleteFinancial(id) {
  if (!confirm('确定要删除该财务记录吗？')) return;
  DB.financial.delete(id);
  toast('财务记录已删除', 'success');
  loadFinancialData();
}

function loadIndicators() {
  var ind = DB.indicators();
  var cards = [
    { label: '流动比率', value: ind.current_ratio },
    { label: '速动比率', value: ind.quick_ratio },
    { label: '资产负债率', value: ind.debt_ratio, pct: true },
    { label: '毛利率', value: ind.gross_margin, pct: true },
    { label: '净利率', value: ind.net_margin, pct: true },
    { label: 'ROA', value: ind.roa, pct: true },
    { label: 'ROE', value: ind.roe, pct: true }
  ];
  var html = '';
  for (var i = 0; i < cards.length; i++) {
    var c = cards[i];
    var v = c.value;
    var d = v != null ? (c.pct ? (Number(v) * 100).toFixed(2) + '%' : Number(v).toFixed(2)) : '-';
    var cls = '';
    if (v != null) {
      cls = v > 0 ? 'positive' : 'negative';
    }
    html += '<div class="indicator-card"><div class="ind-label">' + c.label + '</div><div class="ind-value ' + cls + '">' + d + '</div></div>';
  }
  document.getElementById('fin-indicators-content').innerHTML = html;
}
